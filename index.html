<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>рҹҺ„ Amigo Secreto</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>рҹҺҒ</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* в”Җв”Җв”Җ Reset & base  */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #071510;
      --bg2:       #0c2018;
      --green:     #22c55e;
      --green-d:   #166534;
      --green-dd:  #14532d;
      --gold:      #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.35);
      --red:       #ef4444;
      --red-d:     #b91c1c;
      --white:     #f0faf3;
      --muted:     rgba(240, 250, 243, 0.45);
      --modal-bg:  #0a1f12;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(22, 101, 52, 0.45), transparent),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(7, 21, 16, 0.8), transparent);
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    /* в”Җв”Җв”Җ Snowflakes */
    #snow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .flake {
      position: absolute;
      top: -2rem;
      color: #cde;
      animation: snowfall linear infinite;
      user-select: none;
    }
    @keyframes snowfall {
      to { transform: translateY(105vh) rotate(360deg); }
    }

    /* в”Җв”Җв”Җ Layout  */
    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* в”Җв”Җв”Җ Header  */
    header {
      text-align: center;
      padding: 48px 20px 32px;
    }
    .crown { font-size: clamp(2.5rem, 6vw, 4rem); display: block; margin-bottom: 8px; filter: drop-shadow(0 0 12px var(--gold-glow)); }

    h1 {
      font-family: 'Mountains of Christmas', cursive;
      font-size: clamp(2.6rem, 8vw, 5rem);
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(251, 191, 36, 0.15);
      line-height: 1.1;
      letter-spacing: .02em;
    }
    .subtitle {
      margin-top: 12px;
      color: rgba(134, 239, 172, 0.8);
      font-size: clamp(.95rem, 2.5vw, 1.1rem);
      font-weight: 500;
    }

    /* в”Җв”Җв”Җ Divider  */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 24px;
      color: rgba(134, 239, 172, 0.3);
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(34, 197, 94, 0.3), transparent);
    }

    /* в”Җв”Җв”Җ Cuadricula de nombres  */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
    }

    .name-btn {
      position: relative;
      background: linear-gradient(145deg, var(--green-dd), var(--green-d));
      border: 1.5px solid rgba(34, 197, 94, 0.5);
      border-radius: 14px;
      color: var(--white);
      font-family: 'Quicksand', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      padding: 16px 12px;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .2s,
                  border-color .2s,
                  background .2s;
      overflow: hidden;
      text-align: center;
      line-height: 1.3;
    }
    .name-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.07), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .name-btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 28px rgba(34, 197, 94, .25), 0 0 0 1px rgba(34,197,94,.4);
      border-color: var(--green);
      background: linear-gradient(145deg, var(--green-d), #16a34a);
    }
    .name-btn:hover::before { opacity: 1; }
    .name-btn:active { transform: translateY(-1px) scale(.99); }
    .name-btn .icon { display: block; font-size: 1.3rem; margin-bottom: 4px; }

    /* в”Җв”Җв”Җ Overlay / Modal  */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 10, 5, .78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    #overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: linear-gradient(155deg, var(--modal-bg), #061208);
      border: 1.5px solid rgba(34, 197, 94, 0.45);
      border-radius: 24px;
      padding: 40px 28px 32px;
      width: min(92vw, 420px);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(34,197,94,.12) inset;
      transform: scale(.9) translateY(20px);
      transition: transform .3s cubic-bezier(.34,1.4,.64,1);
    }
    #overlay.show .modal { transform: scale(1) translateY(0); }

    .modal-lock { font-size: 2.4rem; display: block; margin-bottom: 10px; }
    .modal-greeting { color: rgba(134, 239, 172, 0.7); font-size: 1rem; font-weight: 500; }
    .modal-name {
      font-family: 'Mountains of Christmas', cursive;
      font-size: 2rem;
      color: var(--gold);
      text-shadow: 0 0 16px var(--gold-glow);
      margin: 4px 0 22px;
      line-height: 1.2;
    }

    .pw-wrap { position: relative; margin-bottom: 10px; }
    .pw-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(34, 197, 94, 0.4);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Quicksand', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .pw-input::placeholder { letter-spacing: normal; color: rgba(255,255,255,.3); font-weight: 400; }
    .pw-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(251,191,36,.15);
      background: rgba(255,255,255,.09);
    }

    .error {
      min-height: 22px;
      font-size: .85rem;
      color: #fca5a5;
      margin-bottom: 12px;
      transition: opacity .2s;
    }

    .btn-enter {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--red-d), var(--red));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform .18s, box-shadow .18s, filter .18s;
    }
    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(239, 68, 68, .35);
      filter: brightness(1.1);
    }
    .btn-enter:active { transform: translateY(0); }

    .btn-cancel {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: 12px;
      color: rgba(255,255,255,.5);
      font-family: 'Quicksand', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .18s, color .18s;
    }
    .btn-cancel:hover { border-color: rgba(255,255,255,.45); color: rgba(255,255,255,.85); }

    /* в”Җв”Җв”Җ Pantalla de revelaciГіn  */
    #screen-reveal {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    #screen-reveal.show { display: flex; }

    .reveal-card {
      text-align: center;
      max-width: 520px;
      width: 100%;
      padding: 60px 30px 50px;
      margin: 0 auto;
    }
    .rv-hi { color: rgba(134, 239, 172, .7); font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; }
    .rv-from {
      font-family: 'Mountains of Christmas', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold-glow);
      margin-bottom: 36px;
      line-height: 1.15;
    }

    .gift-anim {
      font-size: 5.5rem;
      display: block;
      margin: 0 auto 32px;
      animation: giftbounce 1.2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 20px rgba(251, 191, 36, .3));
    }
    @keyframes giftbounce {
      from { transform: translateY(0) rotate(-4deg); }
      to   { transform: translateY(-20px) rotate(4deg); }
    }

    .rv-msg { color: rgba(134, 239, 172, .8); font-size: 1.15rem; font-weight: 500; margin-bottom: 6px; }
    .rv-to {
      font-family: 'Mountains of Christmas', cursive;
      font-size: clamp(2.8rem, 9vw, 4.5rem);
      font-weight: 700;
      color: var(--red);
      text-shadow: 0 0 24px rgba(239, 68, 68, .45), 0 0 50px rgba(239, 68, 68, .15);
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .rv-shh {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 36px;
      letter-spacing: .03em;
    }
    .btn-back {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      border: 1.5px solid var(--green);
      border-radius: 12px;
      color: var(--green);
      font-family: 'Quicksand', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .18s;
    }
    .btn-back:hover { background: rgba(34, 197, 94, .12); transform: translateY(-2px); }

    /* в”Җв”Җв”Җ Confetti  */
    .conf-piece {
      position: fixed;
      top: -12px;
      pointer-events: none;
      z-index: 1000;
      border-radius: 3px;
      animation: conffall linear forwards;
    }
    @keyframes conffall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(110vh) rotate(900deg) scale(.4); }
    }

    /* в”Җв”Җв”Җ Responsive  */
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      .name-btn { padding: 14px 8px; font-size: .82rem; }
      .modal { padding: 32px 20px 26px; }
    }
  </style>
</head>
<body>

<!-- Snowflakes container -->
<div id="snow"></div>

<!-- в”Җв”Җ Primera pantalla: SelecciГіn de nombre в”Җв”Җ -->
<div id="screen-select">
  <div class="page">
    <header>
      <span class="crown">рҹҺ„</span>
      <h1>Amigo Secreto</h1>
      <p class="subtitle">Toca tu nombre para descubrir a quiГ©n le das el regalo</p>
    </header>

    <div class="divider">вңҰ participantes вңҰ</div>
    <div id="names-grid" class="grid"></div>
  </div>
</div>

<!-- в”Җв”Җ Pantalla 2: Revelar amigo в”Җв”Җ -->
<div id="screen-reveal">
  <div class="reveal-card">
    <div class="rv-hi">ВЎHola,</div>
    <div class="rv-from" id="rv-from">вҖ”</div>
    <span class="gift-anim">рҹҺҒ</span>
    <div class="rv-msg">Tu amigo secreto esвҖҰ</div>
    <div class="rv-to" id="rv-to">вҖ”</div>
    <div class="rv-shh">ВЎShhh! No le cuentes a nadie рҹӨ«</div>
    <button class="btn-back" onclick="goBack()">вҶҗ Volver al inicio</button>
  </div>
</div>

<!-- в”Җв”Җ ContraseГұa в”Җв”Җ -->
<div id="overlay" onclick="overlayBg(event)">
  <div class="modal">
    <span class="modal-lock">рҹ”җ</span>
    <div class="modal-greeting">Ingresa tu clave,</div>
    <div class="modal-name" id="modal-name">вҖ”</div>
    <div class="pw-wrap">
      <input
        id="pw-input"
        class="pw-input"
        type="password"
        placeholder="Tu clave secretaвҖҰ"
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>
    <div class="error" id="pw-error"></div>
    <button class="btn-enter" onclick="submitPw()">Ver рҹҺ…</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>


<script>
/* Configuracion claves y a quien le regala */
const PARTICIPANTES = [
  { nombre: "Abuelita Alicia", clave: "103903",  regalo: "Yobany"         },
  { nombre: "Heriberto",       clave: "139437",  regalo: "Flor"           },
  { nombre: "Paty",            clave: "154193",   regalo: "Jonathan"       },
  { nombre: "Diego",           clave: "216442",  regalo: "Andrea"         },
  { nombre: "Nancy",           clave: "224466",  regalo: "Sergio"         },
  { nombre: "AndrГ©s",          clave: "264946", regalo: "Aleja"          },
  { nombre: "Cesar",           clave: "394193",  regalo: "Paty"           },
  { nombre: "Flor",            clave: "415004",   regalo: "Samuel"         },
  { nombre: "Г“scar",           clave: "432007",  regalo: "Abuelita Alicia"},
  { nombre: "Angie",           clave: "438969",  regalo: "AndrГ©s"         },
  { nombre: "Andrea",          clave: "474681", regalo: "Zory"           },
  { nombre: "Henry",           clave: "509002",  regalo: "Diego"          },
  { nombre: "Ana lu",          clave: "517034",  regalo: "Nydia"          },
  { nombre: "Luisa MarГӯa",     clave: "536282",  regalo: "Г“scar"          },
  { nombre: "Yobany",          clave: "584647",  regalo: "Valentina"      },
  { nombre: "Caro",            clave: "595138",   regalo: "Ana lu"         },
  { nombre: "Aleja",           clave: "614152",  regalo: "Cesar"          },
  { nombre: "Uriel",           clave: "617908",  regalo: "Laura"          },
  { nombre: "Nydia",           clave: "622106",  regalo: "Luisa MarГӯa"    },
  { nombre: "Aristides",       clave: "633145",  regalo: "Nancy"          },
  { nombre: "Valentina",       clave: "656074",  regalo: "Henry"          },
  { nombre: "Jonathan",        clave: "730597",  regalo: "Adriana"        },
  { nombre: "FabiГЎn",          clave: "779839",  regalo: "Angie"          },
  { nombre: "Gricelda",        clave: "793600",  regalo: "Heriberto"      },
  { nombre: "Samuel",          clave: "839386",  regalo: "Caro"           },
  { nombre: "Laura",           clave: "885652",  regalo: "Aristides"      },
  { nombre: "Adriana",         clave: "909067",  regalo: "Gricelda"       },
  { nombre: "Zory",            clave: "958917",   regalo: "Uriel"          },
  { nombre: "Sergio",          clave: "972802",  regalo: "FabiГЎn"         },
];
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */


/* в”Җв”Җ Snowflakes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
(function () {
  const container = document.getElementById('snow');
  const symbols = ['вқ„', 'вқ…', 'вқҶ', 'вңҰ', 'вң§', 'В·', 'вҲ—'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'flake';
    el.textContent = symbols[i % symbols.length];
    el.style.left     = (Math.random() * 100) + 'vw';
    el.style.fontSize = (.5 + Math.random() * .9) + 'rem';
    el.style.opacity  = (.15 + Math.random() * .4);
    el.style.animationDuration = (7 + Math.random() * 9) + 's';
    el.style.animationDelay   = (Math.random() * 14) + 's';
    container.appendChild(el);
  }
})();


/* в”Җв”Җ Constructor nombre de botones  */
const grid = document.getElementById('names-grid');
PARTICIPANTES.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'name-btn';
  btn.innerHTML = `<span class="icon">рҹҺ…</span>${p.nombre}`;
  btn.addEventListener('click', () => openModal(i));
  grid.appendChild(btn);
});


/* в”Җв”Җ Modal state  */
let selectedIdx = null;

function openModal(idx) {
  selectedIdx = idx;
  document.getElementById('modal-name').textContent = PARTICIPANTES[idx].nombre;
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 220);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  selectedIdx = null;
}

function overlayBg(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function submitPw() {
  if (selectedIdx === null) return;
  const val = document.getElementById('pw-input').value.trim();
  if (val === PARTICIPANTES[selectedIdx].clave) {
    const idx = selectedIdx;
    closeModal();
    showReveal(idx);
  } else {
    const errEl = document.getElementById('pw-error');
    errEl.textContent = 'вқҢ Clave incorrecta. IntГ©ntalo de nuevo.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    // clear error after 3s
    setTimeout(() => { errEl.textContent = ''; }, 3000);
  }
}

/* Enter key support */
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPw();
});


/* в”Җв”Җ  Revelar  */
function showReveal(idx) {
  const p = PARTICIPANTES[idx];
  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('rv-from').textContent = p.nombre + '!';
  document.getElementById('rv-to').textContent   = p.regalo;
  document.getElementById('screen-reveal').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  launchConfetti();
}

function goBack() {
  document.getElementById('screen-reveal').classList.remove('show');
  document.getElementById('screen-select').style.display = 'block';
}


/* в”Җв”Җ Confetti dsepues de revelar */
function launchConfetti() {
  const palette = ['#fbbf24', '#ef4444', '#22c55e', '#3b82f6', '#a855f7', '#f97316', '#fff', '#86efac'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'conf-piece';
      const size = 5 + Math.random() * 12;
      const dur  = 2.8 + Math.random() * 2.2;
      const delay = Math.random() * 0.6;
      d.style.cssText = `
        left: ${Math.random() * 100}vw;
        width: ${size}px;
        height: ${size * (Math.random() > .5 ? 1 : 2.4)}px;
        background: ${palette[Math.floor(Math.random() * palette.length)]};
        border-radius: ${Math.random() > .4 ? '50%' : '2px'};
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
      `;
      document.body.appendChild(d);
      setTimeout(() => d.remove(), (dur + delay + .5) * 1000);
    }, Math.random() * 400);
  }
}
</script>
</body>
</html>
